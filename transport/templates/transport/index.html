<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>VIP Transport Riyadh</title>
    <style>
        body { margin: 0; font-family: 'Arial', sans-serif; }
        .hero { 
            height: 100vh; 
            background: linear-gradient(rgba(0,0,0,0.2), rgba(0,0,0,0.2)), url('https://images.unsplash.com/photo-1551830820-2212351654a9?q=80&w=2000'); 
            background-size: cover; 
            background-position: center;
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            color: white; 
            text-align: center;
        }
        h1 { font-size: 3rem; color: #d4af37; margin-bottom: 10px; }
        .btn { 
            background-color: #d4af37; color: black; padding: 15px 30px; 
            text-decoration: none; font-weight: bold; border-radius: 5px; margin-top: 20px;
        }
        .services { padding: 50px; text-align: center; }
        .services-container { 
            display: flex; justify-content: center; gap: 20px; margin-top: 30px; 
        }
        .card { 
            border: 1px solid #ddd; padding: 20px; width: 300px; border-radius: 10px; 
        }
    </style>
</head>
<body>

    <div class="hero">
        <h1>Experience Luxury Riyadh</h1>
        <p>Premium cars, professional drivers, and top-tier service.</p>
        <a href="{% url 'book_ride' %}" class="btn">Book Your Ride Now</a>
    </div>

    <section class="services">
        <h2 style="color: #333; font-size: 2.5rem;">Our Services</h2>
        <div class="services-container">
            <div class="card">
                <h3>Airport Transfer</h3>
                <p>Fast and reliable pickup from Riyadh Airport.</p>
            </div>
            <div class="card">
                <h3>City Tours</h3>
                <p>Explore Riyadh in luxury and comfort.</p>
            </div>
            <div class="card">
                <h3>Corporate Travel</h3>
                <p>Professional services for your business needs.</p>
            </div>
        </div>
    </section>

</body>
</html>
