<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIP Transport</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .hero { background: #343a40; color: white; padding: 60px 0; text-align: center; }
        footer { background: #343a40; color: white; padding: 20px 0; text-align: center; margin-top: 50px; }
    </style>
</head>
<body>

    <header class="hero">
        <h1>VIP Transport Services</h1>
        <p>Premium rides for premium people</p>
    </header>

    <div class="container mt-5">
        {% block content %}
        {% endblock %}
    </div>

    <footer>
        <p>&copy; 2026 VIP Transport - All Rights Reserved</p>
    </footer>

</body>
</html>
